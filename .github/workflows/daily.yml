name: Daily AI Pipeline

on:
  schedule:
    - cron: "*/10 * * * *"   # Every 10 minutes (TESTING)
  workflow_dispatch:

jobs:
  trigger-api:
    runs-on: ubuntu-latest

    steps:
      - name: Call Generate API
        run: |
          echo "Triggering API..."

          response=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST ${{ secrets.APP_URL }}/api/generate \
          -H "Authorization: Bearer ${{ secrets.API_KEY }}")

          echo "Response Code: $response"

          if [ "$response" -ne 200 ]; then
            echo "API call failed!"
            exit 1
          fi
      
      - name: Retry API Call
        run: |
          for i in {1..3}
          do
            echo "Attempt $i"

            response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST ${{ secrets.APP_URL }}/api/generate \
            -H "Authorization: Bearer ${{ secrets.API_KEY }}")

            if [ "$response" -eq 200 ]; then
              echo "Success!"
              exit 0
            fi

            echo "Retrying in 10 seconds..."
            sleep 10
          done

          echo "All retries failed!"
          exit 1 
      
      - name: Call Health Check API
        run: |
          echo "Checking API health..."

          response=$(curl -s -o /dev/null -w "%{http_code}" \
          -X GET ${{ secrets.APP_URL }}/health \  